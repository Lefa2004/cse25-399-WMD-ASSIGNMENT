<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Test Drive</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="logo">Mercedes-Benz</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="model.html">Models</a></li>
      <li class="dropdown">
        <a href="services.html">Services</a>
        <ul class="dropdown-content">
          <li><a href="book test drive.html">Book Test Drive</a></li>
          <li><a href="compare models.html">Compare Models</a></li>
        </ul>
      </li>
      <li><a href="about us.html">About Us</a></li>
    </ul>
  </nav>
</header>

<section class="book">
  <div class="book-container">
    <h2>Book a Test Drive</h2>

    <!-- ✅ FIXED FORM -->
    <form id="bookingForm">
      
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" required>

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" required>

      <label for="model">Select Model:</label>
      <select id="model">
        <option value="sedan">Sedan</option>
        <option value="amg">AMG Performance</option>
        <option value="coupes">Coupes</option>
        <option value="suv">SUV</option>
        <option value="electric">Electric</option>
        <option value="vans">Vans</option>
      </select>

      <label for="date">Preferred Date:</label>
      <input type="date" id="date" required>

      <button type="submit">Submit Booking</button>
    </form>
  </div>
</section>

<!-- ✅ Modal -->
<div id="confirmationModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <p id="modalMessage"></p>
  </div>
</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(event) {
  event.preventDefault(); // ✅ stops page reload (FIXES 405 error)

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const model = document.getElementById("model").value;
  const date = document.getElementById("date").value;

  const modal = document.getElementById("confirmationModal");
  const modalMessage = document.getElementById("modalMessage");
  const closeBtn = document.querySelector(".close");

  if (!name || !email || !phone || !model || !date) {
    modalMessage.textContent = "Submission failed. Please complete all fields.";
    modalMessage.style.color = "red";
    modal.style.display = "block";
    return;
  }

  modalMessage.textContent = "✅ Booking successful! Expect confirmation email soon.";
  modalMessage.style.color = "green";
  modal.style.display = "block";

  this.reset();

  closeBtn.onclick = function() {
    modal.style.display = "none";
  };

  window.onclick = function(event) {
    if (event.target === modal) {
      modal.style.display = "none";
    }
  };
});
</script>

</body>
</html>
