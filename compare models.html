<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compare Models</title>

<style>
/* ✅ Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ✅ Body */
body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
}

/* ✅ Header */
header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ✅ Logo */
.logo {
  font-size: 20px;
  font-weight: bold;
}

/* ✅ Navbar */
nav ul {
  list-style: none;
  display: flex;
}

nav ul li {
  margin-left: 20px;
}

nav ul li a {
  color: white;
  text-decoration: none;
}

/* ✅ Section */
.compare {
  padding: 40px;
  text-align: center;
}

/* ✅ Selectors */
.selectors {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

/* ✅ Inputs */
select {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* ✅ Button */
button {
  padding: 10px 15px;
  background: silver;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: white;
}

/* ✅ Result cards */
.cards {
  display: none;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}
</style>

</head>

<body>

<!-- ✅ HEADER -->
<header>
  <div class="logo">LOGO</div>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="model.html">Models</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about us.html">About Us</a></li>
    </ul>
  </nav>
</header>

<!-- ✅ COMPARE SECTION -->
<section class="compare">

  <h2>Compare Models</h2>

  <div class="selectors">

    <label>Model 1:</label>
    <select id="model1">
      <option value="sedan">Sedan</option>
      <option value="amg">AMG Performance</option>
      <option value="coupes">Coupes</option>
      <option value="suv">SUV</option>
      <option value="electric">Electric</option>
      <option value="vans">Vans</option>
    </select>

    <label>Model 2:</label>
    <select id="model2">
      <option value="sedan">Sedan</option>
      <option value="amg">AMG Performance</option>
      <option value="coupes">Coupes</option>
      <option value="suv">SUV</option>
      <option value="electric">Electric</option>
      <option value="vans">Vans</option>
    </select>

    <!-- ✅ FIXED BUTTON -->
    <button id="compareBtn">Compare</button>

  </div>

  <!-- ✅ RESULT AREA -->
  <div id="result" class="cards"></div>

</section>

<!-- ✅ JAVASCRIPT (INSIDE PAGE → GUARANTEED WORKING) -->
<script>
document.getElementById("compareBtn").addEventListener("click", function () {

  const model1 = document.getElementById("model1").value;
  const model2 = document.getElementById("model2").value;

  const cars = {
    sedan: {
      name: "Sedan",
      engine: "2.0L",
      hp: "200 HP",
      fuel: "Petrol",
      price: "P450,000"
    },
    amg: {
      name: "AMG Performance",
      engine: "4.0L",
      hp: "500 HP",
      fuel: "Petrol",
      price: "P900,000"
    },
    coupes: {
      name: "Coupes",
      engine: "3.0L",
      hp: "350 HP",
      fuel: "Petrol",
      price: "P700,000"
    },
    suv: {
      name: "SUV",
      engine: "3.0L",
      hp: "300 HP",
      fuel: "Diesel",
      price: "P600,000"
    },
    electric: {
      name: "Electric",
      engine: "EV",
      hp: "420 HP",
      fuel: "Electric",
      price: "P800,000"
    },
    vans: {
      name: "Vans",
      engine: "2.5L",
      hp: "180 HP",
      fuel: "Diesel",
      price: "P550,000"
    }
  };

  const result = document.getElementById("result");

  result.style.display = "flex";

  result.innerHTML = `
    <div class="card">
      <h3>${cars[model1].name}</h3>
      <p><strong>Engine:</strong> ${cars[model1].engine}</p>
      <p><strong>Horsepower:</strong> ${cars[model1].hp}</p>
      <p><strong>Fuel:</strong> ${cars[model1].fuel}</p>
      <p><strong>Price:</strong> ${cars[model1].price}</p>
    </div>

    <div class="card">
      <h3>${cars[model2].name}</h3>
      <p><strong>Engine:</strong> ${cars[model2].engine}</p>
      <p><strong>Horsepower:</strong> ${cars[model2].hp}</p>
      <p><strong>Fuel:</strong> ${cars[model2].fuel}</p>
      <p><strong>Price:</strong> ${cars[model2].price}</p>
    </div>
  `;
});
</script>

</body>
</html>
