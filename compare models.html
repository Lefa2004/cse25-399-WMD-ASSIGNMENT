
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compare Models</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
}

/* ✅ Header */
header {
  background: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-weight: bold;
}

/* ✅ Section */
.compare {
  text-align: center;
  padding: 40px;
}

/* ✅ Dropdown layout */
.selectors {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
}

select, button {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* ✅ Button */
button {
  background: silver;
  cursor: pointer;
}

button:hover {
  background: white;
}

/* ✅ Cards */
.compare-cards {
  display: none;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.car-card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}
</style>

</head>

<body>

<header>
  <div class="logo">LOGO</div>
</header>

<section class="compare">

  <h2>Compare Models</h2>

  <div class="selectors">
    <label>Select Model 1:</label>
    <select id="model1">
      <option value="sedan">Sedan</option>
      <option value="amg">AMG Performance</option>
      <option value="coupes">Coupes</option>
      <option value="suv">SUV</option>
      <option value="electric">Electric</option>
      <option value="vans">Vans</option>
    </select>

    <label>Select Model 2:</label>
    <select id="model2">
      <option value="sedan">Sedan</option>
      <option value="amg">AMG Performance</option>
      <option value="coupes">Coupes</option>
      <option value="suv">SUV</option>
      <option value="electric">Electric</option>
      <option value="vans">Vans</option>
    </select>

    <!-- ✅ FIXED BUTTON -->
    <button onclick="compareModels()">Compare</button>
  </div>

  <!-- ✅ RESULT AREA -->
  <div id="comparison-table" class="compare-cards"></div>

</section>

<script>
function compareModels() {

  const model1 = document.getElementById("model1").value;
  const model2 = document.getElementById("model2").value;

  const cars = {
    sedan: {
      name: "Sedan",
      engine: "2.0L",
      hp: "200 HP",
      fuel: "Petrol",
      price: "P450,000"
    },
    amg: {
      name: "AMG Performance",
      engine: "4.0L",
      hp: "500 HP",
      fuel: "Petrol",
      price: "P900,000"
    },
    coupes: {
      name: "Coupes",
      engine: "3.0L",
      hp: "350 HP",
      fuel: "Petrol",
      price: "P700,000"
    },
    suv: {
      name: "SUV",
      engine: "3.0L",
      hp: "300 HP",
      fuel: "Diesel",
      price: "P600,000"
    },
    electric: {
      name: "Electric",
      engine: "EV",
      hp: "420 HP",
      fuel: "Electric",
      price: "P800,000"
    },
    vans: {
      name: "Vans",
      engine: "2.5L",
      hp: "180 HP",
      fuel: "Diesel",
      price: "P550,000"
    }
  };

  const car1 = cars[model1];
  const car2 = cars[model2];

  const output = document.getElementById("comparison-table");

  /* ✅ SHOW RESULT */
  output.style.display = "flex";

  /* ✅ DISPLAY CARDS */
  output.innerHTML = `
    <div class="car-card">
      <h3>${car1.name}</h3>
      <p><strong>Engine:</strong> ${car1.engine}</p>
      <p><strong>Horsepower:</strong> ${car1.hp}</p>
      <p><strong>Fuel:</strong> ${car1.fuel}</p>
      <p><strong>Price:</strong> ${car1.price}</p>
    </div>

    <div class="car-card">
      <h3>${car2.name}</h3>
      <p><strong>Engine:</strong> ${car2.engine}</p>
      <p><strong>Horsepower:</strong> ${car2.hp}</p>
      <p><strong>Fuel:</strong> ${car2.fuel}</p>
      <p><strong>Price:</strong> ${car2.price}</p>
    </div>
  ;
}
</script>

</body>
</html>
