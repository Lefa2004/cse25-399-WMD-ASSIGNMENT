
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compare Models</title>

<style>
/* ✅ Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ✅ Body */
body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
}

/* ✅ Header */
header {
  background: black;
  padding: 15px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

/* ✅ Section */
.compare {
  padding: 40px;
  text-align: center;
}

/* ✅ Controls */
.selectors {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

/* ✅ Inputs */
select {
  padding: 8px;
}

/* ✅ Button */
button {
  padding: 10px 15px;
  background: silver;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: white;
}

/* ✅ Cards container */
.cards {
  display: none; /* hidden first */
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

/* ✅ Card */
.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}
</style>

</head>

<body>

<header>
  <div class="logo">LOGO</div>
</header>

<section class="compare">

  <h2>Compare Models</h2>

  <div class="selectors">

    <label>Model 1:</label>
    <select id="model1">
      <option value="sedan">Sedan</option>
      <option value="amg">AMG</option>
