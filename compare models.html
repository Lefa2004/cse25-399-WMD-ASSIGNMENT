

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compare Models</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  background: black;
  padding: 15px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.compare {
  padding: 40px;
  text-align: center;
}

.selectors {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

select {
  padding: 8px;
}

button {
  padding: 10px 15px;
  background: silver;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: white;
}

.cards {
  display: none;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}
</style>

</head>

<body>

<header>
  <div class="logo">LOGO</div>
</header>

<section class="compare">

  <h2>Compare Models</h2>

  <div class="selectors">

    <label>Model 1:</label>
    <select id="model1">
      <option value="sedan">Sedan</option>
      <option value="amg">AMG</option>
      <option value="coupes">Coupes</option>
      <option value="suv">SUV</option>
      <option value="electric">Electric</option>
      <option value="vans">Vans</option>
    </select>

    <label>Model 2:</label>
    <select id="model2">
      <option value="sedan">Sedan</option>
      <option value="amg">AMG</option>
      <option value="coupes">Coupes</option>
      <option value="suv">SUV</option>
      <option value="electric">Electric</option>
      <option value="vans">Vans</option>
    </select>

    <!-- ✅ IMPORTANT BUTTON -->
    <button id="compareBtn">Compare</button>

  </div>

  <!-- ✅ RESULT -->
  <div id="result" class="cards"></div>

</section>

<script>
document.getElementById("compareBtn").addEventListener("click", function () {

  const model1 = document.getElementById("model1").value;
  const model2 = document.getElementById("model2").value;

  const cars = {
    sedan: { name: "Sedan", engine: "2.0L", hp: "200HP" },
    amg: { name: "AMG", engine: "4.0L", hp: "500HP" },
    coupes: { name: "Coupes", engine: "3.0L", hp: "350HP" },
    suv: { name: "SUV", engine: "3.0L", hp: "300HP" },
    electric: { name: "Electric", engine: "EV", hp: "420HP" },
    vans: { name: "Vans", engine: "2.5L", hp: "180HP" }
  };

  const result = document.getElementById("result");

  result.style.display = "flex";

  result.innerHTML = `
    <div class="card">
      <h3>${cars[model1].name}</h3>
      <p>Engine: ${cars[model1].engine}</p>
      <p>HP: ${cars[model1].hp}</p>
    </div>

    <div class="card">
      <h3>${cars[model2].name}</h3>
      <p>Engine: ${cars[model2].engine}</p>
      <p>HP: ${cars[model2].hp}</p>
    </div>
  `;
});
</script>

</body>
</html>
